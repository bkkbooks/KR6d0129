body:
  text: 妙法蓮華經優婆提舍者妙法蓮華經是所釋經本名優婆舍釋論名也所釋經本義要有二一開方便門二示真實相真實相者謂證道也方便門者謂教道也此二種道並甚深軌時義故名妙法言蓮華者喻顯妙法出離十慢之濁開敷一乘之實故譬蓮華又蓮華者寄譬別顯法功德此經所顯方便真實各有二種謂法與人法謂妙法功德當體立名名為妙法人謂法師功德寄喻顯示名為蓮華義如上釋優婆提舍名為論議即十二分中論議理也亦名摩怛理伽言勒伽者音之略也律釋經文研究深義是故名為優婆提舍依所釋經立論名故是依主釋或此論中攝法華經所有要義名藏真諦翻云天親其人本是天帝之弟故名天親沙門玄奘翻為世親菩薩託生於世因祈世親之天故為名焉此論二本一是勒那摩提所翻無歸敬頌二是菩提流支所翻有歸敬頌文句小異義意無別今所釋者流支翻也致敬序中大分為三初一頌通敬三寶願釋經意次一頌別敬教主及對揚衆顯造論意後一頌半一總歸勝緣請承加護頂禮者起淨心轉愛果舉體頂禮也正覺海者謂佛菩提廣大深一味具德名正覺海淨法者謂證教法並皆離垢上名為淨法無為僧者賢聖衆皆以無為與同名故名無為僧就勝唯取登地菩薩下二句者顯釋經意又可顯示敬之所為禮三寶者為何所為為深利智者開示毗伽典故深智者謂回向菩提聲聞得無漏慧達注性故利智者謂新發意菩薩直趣菩提非迃回故為斯二人説一乘法開者直説而開示者委曲而示又開者開權示者示教滿理圓名毗伽典如涅槃云長者教子先以半字後毗伽謂其義相似彼經半字喻於小乘毗伽羅論喻大乘故何者名為毗伽論劫初成時摩醯首羅與毗劒和合生子名婆藍摩彼有四面説四皮陀頂上一頭説一皮陀四面所説並是世法頂上所説語深難解世所行者唯四皮陀後人更作六種論解四皮陀毗伽羅論即是六論之一也解阿闥皮陀辨聲明法也阿闥皮陀者是後面所説也西方重此聲論故經十二年乃有通解非初尊者之所能解故以毗伽喻大乘也祇虔牟尼尊者謂適敬於牟尼尊也前敬佛中雖通敬禮而教主故須別敬也及菩薩聲聞者謂文殊彌勒舍利子等對揚衆也前禮僧中雖六通禮而對揚故須別敬也下二句者顯造論竟又二顯示列教所為欲令以法自他利故略出比經勒伽論也摩德勒名為本母以能顯了源隱之義如字之本母名摩德勒伽若正應云摩怛理伽今存略故名勒伽論後請加護如文應知上來敬序已訖自下正釋經文即是論之正體若依此論科經文者大分為三一者七種功德成就名教起因緣分即初序品是二者五分破二明一開方便分須方便品是三者對治十無上顯實相分譬喻已下至於經竟流通之分第十無上中通攝故不別立釋初品中先牒初二分纏第分經不盡牒者文隱難解牒而釋之相顯易知皆在略故如是我聞等雖不別釋文少故并牒經曰歸命等者結集經者將欲出經故先歸命一切經者理應皆有無者存略論曰此法門初第一品示現明七種功德成就何等為七一者序分成就二者衆成就三者如來欲説法時至成就四者依所説法隨順威儀住成就五者依止説因成就六者大衆欲聞現前成就七者文殊師利菩薩答成就解云論釋經中有二一開列章門二隨釋章門初中先總開後別列初總開中此法門者總舉一部之法門也初第一品者別約草八品中初第一品也初言便足何故復言第一品者為顯草八品勒為三分今此序品約分在初約品第一兼二義故言初第一七種功德成就者謂序等七事總別隨應皆有發生信解之功助顯實相功德如所安立不可破壞是故名為功德成就別列章中先徵後列序分成就者如是我聞等五句文句玩少又是通序是故此中總名序分衆成就者依十地論亦序分攝證信六句皆通序故令就別義名衆成就教所被機起教勝故要因機勝劣顯教深淺故伽耶山頂論名所應聞弟子成就分者義意亦同為顯亦有通序義故前牒經文與序并牒如來欲説法時至成就者成道來四十餘年所以未曾説此妙法衆生根未熟説時未至故今根機已熟説法時至是故先説無量義經將為此經之前北也依所説法隨順威儀住成就者説時既至將欲起説必依如法順威儀住以佛尊重所説法故待處待衆方起説故此是三世諸佛説法儀則故名依如法隨順威儀依止説因成就者既住順儀雨華動地將表內證復放豪光衆覩希有之瑞皆起渴仰之念依此欲心而起説故是故名為依止説因大衆欲聞説法成就者前雖欲問其相未現發言推問欲相方現是故名為欲聞現前文殊師利答成就者現見過去因果相故騰衆疑情能決所滯是故名彼答成就也雖七種事皆有序義以從通名為序品故然初一分從通受名餘六皆從別義立目如五境名義無所違論曰又序分成就者此法門中示現二種勝義成就此義應知何等為二一者示現諸法門中最勝義成就二者示現自在功德義成就如王舍城勝於一切諸餘城舍耆闍崛山勝諸餘山顯此法門最勝義故如經婆伽婆住王舍城耆闍崛山中故解云此下隨釋釋序分中唯釋住處餘皆存略文義同餘經無別所表故於中有四一牒章總標二徵數別列三指事顯義四牒經重成言又序分成就者謂此牒章也序分所攝住處非但依處起教亦有所表別義顯別義故説又言此法門下總標勝義所表義深故勸應知何等為二者微數也一者已下別列勝義示現諸法門中最勝義成就者謂妙法功德證甚深於諸法中最勝義故阿含甚深於諸門中最勝義故何故最勝諸佛所乘究竟乘故過此更無餘勝法故自在功德義成就者謂法師功德前是所乘法此是能乘人如自所證説授與人不待思惟成所作事故云自在功德成就如王舍下指事顯義勝於一切諸餘城舍者智度論云有人言閻浮提四方中東方為始曰初出故東方之中摩伽陀國最勝摩伽陀國中王舍城最好其城中有十二億家是中人多聰明廣學多識其國豐樂乞食易得城在山中間靜精舍多故坐禪人喜住廣如論説今以義求有七種勝一名勝王舍故二方勝在東故三處勝家多故四住人勝聰明人多故五豐樂勝乞食易得故六間靜勝在山中故七住止勝多精舍故此法門亦爾諸經中王法門中最廣攝諸乘明智所住法樂豐饒在炎山賢聖喜住者闍崛山勝諸餘山者智度又云問餘更有四山婆羅婆羅恕等等何以多住耆闍崛山答耆闍崛山於五中最勝故云何最勝精舍近城而山難上難上故雜人不來近城故乞食不疲證此法門者品爾不捨世間而入炎入涅槃故般若不染於世不捨世故大悲恆接於物顯此法以最勝義故者顯成勝義餘如文論曰衆成就者有四種義故成就示現應知何等為四一者數成就二者行成就三者攝功德成就四者威儀如法住成就解云自下第二釋衆成就經文中有二初列十五衆名數等後總顯四衆威儀如法住前牒經中且列二衆謂比丘衆及菩薩衆此二衆中其文有五一標類二唱數三歎德四列名五總結論牒經中後二存毗以論釋中通約為四於中有三一標二列三釋有四等標其數何等下列其名數成就者總顯十五衆之願數行成就者總顯此衆所有業行此行成就有義無文亦可比丘菩薩等名即願其行各隨其行業立通別名故攝功德成就者總顯此衆所有功德文顯比丘及菩薩衆義通餘衆但文略也威儀如法住成就者總顯此衆所有威儀此四種義隨義總科非一一衆文皆具四初及第五衆文義皆具四其餘十三文唯有二數及威儀義通有四各隨其所應亦有行德故論曰數成就者謂大衆無數故行成就者有四種一者謂諸聲聞修小乘行二者謂諸菩薩修大乘行三者謂諸菩薩神通自在隨時示現能修行大乘如陀婆羅等十六賢士具足菩薩不可思議事而常示現種種形相謂優婆塞優婆夷比丘比丘尼等四者謂出家聲聞威儀一定不同菩薩故解云自下別釋大衆無數者總顯十五衆生數無量故釋行成就中有四者前二顯示大小乘中內所修行後二顯示大小乘中外所現行理實四種皆通在家及出家行而第四中遍舉出家者以相顯故厭離生死捨化他事速求自度修覺分等名小乘行雖厭生死而不捨衆生為兼濟故修六度等名大乘行此二名為內所修行內行既成外相亦現菩薩隨緣通現四衆聲聞一定多現出家此二名為外所現行現行論曰皆是阿羅漢等有十六句示現聲聞功德成就故皆於阿耨多羅三藐三菩提不退轉等有十三句示現菩薩功德成就故解云自下釋第三攝功德成就於中先標二衆功德後釋二衆功德標中不牒章者文存略耳論曰聲聞功德成就者彼十六句三門攝義示現應知解云釋中先釋聲聞功德後釋菩薩功德聲聞功德中有三一開三門二列三門三依三門釋十六句此則開門謂彼皆是阿羅漢等十六句上上起等三門總功德義示現應知論曰何等三門一者上上起門二者總別相門三者攝取事門解云上上起門者依所成能成句謂能成句上所成句上而能成立或所成句上能成句上而所成立故名上上起起者成也總別相門者依標釋句謂先總標一句後以別句解釋故云總別相門攝取事門者依滿不滿句若是滿句一句攝取一切德事若不滿句二三句合攝取一切德事故云攝取事門論曰上上起門者謂諸滿已盡故名為阿羅漢乃至到第一彼岸者善得正智心解脫善得神通無諍三昧等諸功德故解云自下依門釋此則依初上上起釋此初門中其例有十一以後起二以二前起三前後起四以文起五以義起六文義起七鄰次起八隔越起九單獨起十重復起諸漏已盡故名為阿羅漢者此有四例一以後起二文起三鄰次起四單獨起其可義知阿羅漢者名之應應受世間妙供養故又名煞賊皆已永害煩惱賊故又名不生永不復受分段生故此三種義皆由諸漏已盡故以諸漏已盡成阿羅漢以心得自在故名為諸漏已盡者此有四例一以後起二以文起三隔越起四單獨起永不繫屬諸煩惱故名心自在心若不自在諸漏難盡故故以心得自在成諸漏已盡言諸漏者謂欲漏等三種漏也八十九云諸欲界繫一切煩惱唯除無明説名欲漏諸色無色二界所繫一切煩惱唯除無明説名有漏若諸有情或未離欲或已離欲除諸外道所有耶僻分別愚癡所生惡見弊覆其心依此惡見於彼諸欲一分尋求一分離欲乃至非想非非想處於彼三界所有無知總攝為一名無明漏以無復煩惱故名為心得自在以善得心解邪善得慧解邪故名為心得自在者此亦四例一前後起二以文起三鄰次起四重復起何故重復起者以心自在有通別故通則不屬諸煩惱故別則解脫二種縛故善得心解脫者離三界貪故善得慧解脫者已離一切染無明故如説離貪心得解脫離於無明慧得解脫智度問曰答一切三界煩惱離故心得解脫何故佛言染愛離心得解脫答曰愛能繫閇心有大力故以是故説不餘煩惱愛斷餘則斷又諸結使皆屬愛見屬愛煩惱覆心屬見煩惱覆慧愛離故屬愛結使亦離得心解脫無明離故屬見結使亦離慧得解脫是不退法得無生智故名善得以遠離能見故名為無復煩惱者此是以義獨起因具有三種一不正思惟二順貪等境三隨眼未害今且説二能見者謂不正思惟所見者謂順貪等境於此二因並遠離故所斷煩惱無復起世以善得心解脫善慧解脫故名為心善調伏者此亦四例謂以前文復鄰次起愛等不離心不調伏以能離故心善調伏故以三解脫成心善調伏佛地三釋有義有學離見所斷一百十二種分別粗重煩惱不𢤱悷故猶如良馬名為調順有義無學離見修斷一百二十八種煩惱不剛強故猶如真金名為調順如實義者皆是回向菩提種性一切堪能發起大果隨佛意轉如聰慧象故名調順今言調伏其義亦同若唯言調伏隨應通三義若言善調伏唯在後二義有學雖調伏非善調伏故人中大龍者行諸惡道如平坦路無所拘礙應行者已行應到處已到故者此是以義復起諸惡道者謂苦集諦以是雜染可厭怖故平坦路者謂滅道諦以是清淨可欣樂故以空等行觀彼無性雖行雜染而無所著故云如平坦路無所拘礙又知苦斷集故行諸惡道如平坦路無所拘礙證滅修道故應行者已行應到處已到應作者作者人中大龍已得對治降伏煩惱之怨敵故者此是以前文起復以義成謂盡智中苦已知集已斷滅已證道已修如是知者應作者作故以前大龍成應作者作又知集因盡故云已得對治降伏煩惱之怨敵故所作已辦者更不後生如相應事已成就故者此是義釋謂無生智中苦果不生於知苦等不復更作故云更不後生如相應事已成就故離諸重擔者已應作者作所作已辦後生重擔已捨離者此是文義重復起也智度論云五陰粗重常惱故名為擔如佛説何謂為擔五陰是擔因盡果不生故能離五陰重擔故以應作者作等成離諸重擔應作者作等中證滅修道非離重擔義故重釋云後生重擔已捨離故有經説言棄擔能擔謂棄苦集之擔能擔滅道之擔逮得己利者已捨重擔證涅槃故者此是文義單獨起也陰擔非己利而能捨故涅槃是己利而能證故故云逮得己利盡諸有結者以逮得己利斷諸煩惱因故者此亦文義單獨起也以逮得涅槃之利故能盡諸有以斷諸煩惱之因故能盡諸結煩惱因者謂能見所見不正思等以如前所説善得正智心解脫者諸漏已盡故者此是單文隔越起也謂諸漏已盡故善得正智心解脫非唯見色得解脫也如摩健提梵志弟子舉其尸著床上輿行城市中多人處唱言若有瞋見摩揵提屠是人皆得清淨道何況禮拜供養者多有人信其言諸比丘聞是語白佛言是事云何佛説偈言小人眼見求清淨如是無智無實道諸結煩惱滿心中云何眼見得淨道若有眼見得清淨何用智慧功德寶智慧功德乃為淨眼見求淨無是事一切心得自在者善知見道修道智故者此是以義單起於見修道能自證知非由他教所引集故名自在也伽耶山論云依不顛倒受教修行者其義亦同善知見道故依不顛倒善知修道故受教修行由此二因故得一切心得自在前言心得自在者謂不屬煩惱義此言一切心得自在者謂於諸聖道證知義到第一彼岸者善得正智心解脫善得神通無淨三昧等諸功德故者此是文義單獨起也以二義故名到第一彼岸一異外道及有學聖以善得正心解脫故二異慧解脫無別修功德以善得神通無淨三昧等諸功德故上來所釋十六句中相從有三句一唯所成非能成此有五句謂阿羅漢心善調伏盡諸有結一切心得自在到第一彼岸二唯能成非所成此有二句謂善得心解脫善得慧解脫三通能成所成謂餘九句非能成所成者無作總頌曰前後文義俱鄰隔及單重能所相乘成上起義應知一七十三五最後唯所成五六唯能成餘九通二義論曰大阿羅等者心得自在到彼岸故乃至是故名為衆所知識解云依三門釋十六中第一門已竟故因此仍釋總結之文列名之文易可知故略不釋也論曰總別相門者皆是阿羅漢等十六句初句是總餘句別故乃至十五者應如實知同生諸衆得諸功德為利益一切諸衆生故解云自下第二依總別門釋十六句彼阿羅漢名之為應者阿羅漢名雖含三義今就應義名之為總以通十五種應義故十五種者於總應中隨義別目一者應受飲食臥具供養恭敬等故者謂應受供應以諸漏已盡故應受世間飲食等供應將大衆教化一切者謂應教化應以無復煩惱故應將大衆教化一切第三者謂應遊入應以心得自在故應入聚落等遊行無失第四者應降伏應以善得心解脫故應降伏外道等如龍樹云諸外道等助道法不滿若行一切德若行二功德求道不能得如人但布施求清淨有但布施持戒説清淨有但布施禪定説清淨有但布施智慧説清淨如是等種種道不具足若無功德若小功德説清淨是人雖一處心同解脫不名好解脫涅槃不滿足故如説無功德人不能度生老病死之大海小功德人品不度善行道法佛所説度須跋陀梵志事廣説應知第五者應觀察應以善得慧解脫故應以智慧速觀察法速觀察者能多入義能多行者説名速故第六應説法應以心善調伏故應不疾不遲説法如法相應不疲惓也七者應頭陀應以人中大龍故應靜坐空間處等龍性樂靜及小欲等如律中坐禪比丘乞龍珠事八應善行應以應作者作故一向行善不著諸禪第九者應行空聖行應以所作已辦故應行空行離空無我智所作難辨故第十者應行無相聖行應以離五陰擔故於涅槃中行無相行十一者應行無願聖行應以得涅槃利故於三界中行無願行十二者應降伏世間禪應以盡諸有結故能伏世間禪淨心也十三者應起諸通勝功德應以善得正智心解脫故能起諸通勝功德也十四者應證第一義勝功德應以一切心得自在故善知見修道知故能證勝功德也十五者應如實知同生諸衆應以到第一彼岸故能如實知同生諸衆所得功德同生衆者非異生衆謂聖衆也此復三應如次顯示智斷恩德論曰攝取事門者此十五句攝取十種功德乃至十者攝取上首功德如經到第一彼岸故解云自下第三依攝取事門釋十六句上此十五句攝取十種功德者唯約別中辨其攝取故云十五示現可説果不可説果故者有為功德名可説果以相差別故無為功德名不可説果以相無別故攝事分云從此已後不復應修所行境性如實已斷一切煩惱即於爾時於諸煩惱斷滅涅槃離增上慢即由遠離增上慢故此現實有究竟明脫如實領受已得明脫所行境性由此出離一切所有有為法故當知明脫亦得出離於涅槃中能取所取二種施設皆無所有一切戲論永滅離故是故乃至諸有為法可得展轉問答施設能取所取言論差別究竟涅槃無為法中一切問答言論差別皆不如理十中初一是不可説果後九皆是可説果也德功德者謂斷功德當體是德無相差別是故就體名德功德諸功德者謂伏他功德隨所伏異名為諸也不違功德者自順功德自能隨順故名不違勝功德者有大力故名勝功德如龍樹説無數阿羅漢中最大力故云龍象水行中龍力大陸行中象力大故又如大龍王從大海出起於大雲遍覆虗空放大電光明照天地澍大供雨潤澤萬物諸阿羅品復如是禪定智慧大海水中出起慈悲雲潤及可度現大光明種種變化説實相法雨弟子心令出善牙所應作勝功德者供養如來等名所應作依法供養中最名應作勝滿足功德者學地所作已滿足故智度論云得𤏙法頂法忍法世間第一法故名所作得苦法忍等諸無漏善根故名已辨得見諦道故名所作得思惟道故名已辨得學道故名所作得無學道故名已辨第七過功德中過愛者此中以愛為重擔故過求命供養恭敬者以逮得涅槃利故能過世間求命等利由求命等非己利故論云何己利云何非己利行諸善法是名己利諸餘法是名非己利信戒捨定慧等諸功德一切財寶勝故今世後世常得樂故甘露城能到故名為己利餘非己利如偈説世起種種無道法與諸禽獸等無異常求正智要道法得脫老死入涅槃過上下界者以盡諸有結故有三謂欲等三有結謂愛等九結論云是結使盡及有是有盡及結使故名有結盡如人從高處墮未至地之此人死雖未死知必死故如是諸阿羅漢結使已盡知有必當盡故言有結盡上上功德者以是不動法故應作利益衆生功德者以得神通無量等故上首功德者以到究竟故列名之文論存略也總結之文如前已釋第五菩薩衆中文亦有五一標衆二唱數三嘆德四列名五總結論曰菩薩功德成就者彼十三句二門攝義示現應知何等二門一者上支下支門二者攝取事門解云自下顯示菩薩攝功德門即是第三嘆德文也於中有三一分牒章二分門三釋義此即牒章及分門於中有三一分二徵三列如文論曰上支下支門者所謂總相別相此義應知解云總相是標句故名上支別相是釋句故云下支皆於阿耨多羅三藐三菩提不退轉者即是標句皆得陀羅尼等十二句是釋句故四何以故菩薩嘆德中唯以二門解釋功德不説上上起門其義云何答聲聞德中嘆同位德能所相乘成是有上上起以上上起者顯示能所相乘成之義故菩薩嘆德中明別位三地功德故無能所相乘成之義是以不説上上起門也阿耨多羅三藐三菩提者此反無上正華覺體即佛果所有五法謂淨法法界及四智品説智及智處菩提菩提斷皆名菩提故不退轉者由具下十因不退轉故於佛果能不退轉決定當證念念進修名不退轉八地以上任運進修於大菩提修曾不退無煩惱故亦復不為一切有相功用所動名不退轉由此八地名不動地相用煩惱不能動故不退有四一信不退十信第六名不退心自後不退生耶見故二位不退十住第七名不退住自後不退入二乘故三證不退初地以上所證得法不退失故四行不退八地已上為無為法皆能修故今此菩薩皆八地上故言於無上菩提不退轉定當證故名不退和上云有五種菩提一發心菩提謂十信位若未得第六心以來已得未得法中皆是退失第六心已得以去已得不退未得法中猶退失也二伏心菩提謂三賢位未得十解第七住以來未得已得法中皆是退失已得第七住以去已得不退未得猶退十回向中第六回向已去已得未得法中皆是不退所以者何以三練磨練磨其心故伏心者伏除煩惱除伏其心故謂修行六度等諸行及伏除六弊障等故名為伏心三明心菩提謂從初地至第七地已得不退未得法中猶退失也自已得法中生染著故上勝法中不進趣故來得中退明心者初地中已得照明法性真理故明心菩提四出道菩提者謂第八地以上三地法疾流中任運流故已得未得法中皆不退也出道者已出分段生死升薩波若故名出道也五無上菩提者即佛果也問已入第八地菩薩當言何相答當言於無加行無功用無相界作意得任運故無有動搖於一切相得自在故住清淨地四入第九地菩薩當言何相答當言於名身句身文身得自在故又得無罪無量廣大慧故又得廣大無礙解故能悅一切衆生心故名大法師問已入第十地菩薩當言何相答當言已得一切如來同大灑故已得如雲大法身故已得一切大神通故名如來彼不退轉十種示俱此義應知自此以下依下支門牒文釋義基公云下支門中有十二句以十種示現此十種中分為二門初九自利後一利他初九又二初八有為功德後一無為功德初中又二初五福惠後三悲智住聞法不退皆得陀羅尼陀羅尼者此云總持總持有二一攝二散攝者持也此即聞持聞於文義任持不忘即所聞之能持名之為攝聞即總持體念惠也十地經云八地以上菩薩於一切法能堪能思能修彼論解云堪謂聞惠思謂思惠持謂修惠於一修惠分三用故散者施也以四種陀羅尼施與衆生故二樂説不退者謂樂説辨才辨才者即是四辨七辨而樂説故四辨者即四無礙解一法無礙解二義無礙解此二如次即是解教理無滯智三詞無礙解即解諸方言音無滯智四辨説無礙解即説法等無滯之智七辨之義如餘廣説三説不退轉者真諦三藏云有三種法輪一轉法輪謂佛二月八日成道四月八日往婆羅奈為五比丘轉四諦法輪二照法輪謂佛成道以後第七年中往施惠江邊去祇洹林三里説般若等無相大乘是名第二法輪三持法輪佛成道以後第三十八年中後毗舍離鬼王法堂為勝義性等諸菩薩説解節經等即是解深密等了義大乘是名第三法輪初是小乘次是大乘後是一乘普攝三乘皆歸大乘此三如次名轉照持依金光明立此三名若依此解諸大乘中未回小乘者回入第二法輪回小乘者入第三法輪問若爾深密經中説趣寂性終不回入又説一乘是密意語何得為第三法輪答彼云説趣寂性不能令得大菩提者就未回心時説若回心時非不能成問若爾與回向聲聞何異答若曾發大心中間退住小乘於釋迦一化還入大者名為回向聲聞故法花論説此名為退菩提聲聞經據後時名為回向論就初位名為退心故知曾退後還者名為回向菩提聲聞若曾未發心者釋迦一化根未就故終不入大以愚法故起滅度想是人名為趣寂聲聞法花論中名決定聲聞以一化中不能回故彼人必起滅度想故名為趣寂以不能回小乘心故亦名決定説一乘教名密意者依法同等八種意趣唯説一乘設根差別名為密意説一乘也若説三乘利鈍若別漸𧂐行終歸大乘如是説一非密意也故梁攝論以十一意説一乘義前三是顯了説後八是密意説解深經據後義故説唯有一是密意也四依心善知識不退轉以身心業依色身攝取故此有三句令為第四依止善知識不退轉供養無量百千諸佛於諸佛所殖衆德本論名殖衆善根以己身心業依佛色身攝取故菩薩修行莫過身心以己身心之𣏋供養諸佛外色身故攝取己身心中一切所有善業故色身者即佛身菩薩依止佛色身種己善根故問何故不依法身種善根耶答明供養種善根等事故須明色身攝取者依佛色身種一切善根為攝取也供養有十菩薩地説一現前供養於現前佛設利羅及制多等一切三寶親面供養二不現前供養於餘佛制多等作等想修不現前供養三現前不現前供養現對佛時復作是念一佛制多等法性即三世十方諸佛制多等法性故我今者現前供養四於如是等諸如來所唯自供養五起慈悲心以自衣物施貧窮人令其供養六自他供餘自供養時次勸教他作此供養七財敬供養以花香等敬而禮拜乃至以珍寶等施於諸佛財敬供養八廣大供養即以財敬長時多妙乃至淨心回向菩提自力集財從他求得作為是願今此一身化作百千身恭敬禮拜一一化身出百千手持散花香於一音聲亦出千聲歌讚實德復出百千妙莊嚴具而為供養乃至十方所有供養普生隨喜雖少用功而興無邊廣大供養九無染供養不以輕慢矯詐放逸不淨之物以尊重心乃至清淨之物而修無染供養十正行供養若有須臾修四無量乃至少時信忍離言真如法性起無分別住無相心即為守護菩薩淨戒乃至修行四攝事等修正行供養此為最上最妙過前供養百千萬億不可比喻五斷一切疑不退轉者和上云菩薩修行時於自心中為退為不退疑心起時若被諸佛所讚若受所授記即自了知我必不退是名斷一切疑基公云由諸菩薩八地已上位於理事疑盡煩惱所知二疑俱盡故第八地名決定地是故被諸佛常所稱嘆六為何等何等事説法入彼彼法不退轉者基公説諸菩薩為何等事外為他説法內入證諸法以大慈悲熏修身心拔苦與樂故願行二利但為慈悲不由餘事一云何等何等事者佛以慈悲方便力故隨諸衆生根器不同説三乘教所説教法非一種故何等何等入彼彼法者以三乘教令入三乘之行法所入行法非一種故入彼彼法七入一切智如實境界者此言顛倒應云入如實境界之一切智不退轉問一切智云何名如實境界答佛一切智為諸菩薩是所入境界故八依我空法空不退轉通達大智二無我智也藏師云問我空法空何故名大智答小乘但得人空以為小智菩薩俱得二空故言大智也九入如實境界不退轉者此前二無我智所證入無為大涅槃十作所應作不退轉者此諸菩薩等名稱普聞故衆生聞名信問修學由此名稱能度數百千衆生故名作所應作菩薩所應作謂利衆生故上來上支下支門竟第二明攝取事門者論有三復次第一復次攝取事門者示現諸菩薩住何等清淨地中因何等方便於何等境界作所應作故此為總標論下牒釋十三句中分之為三皆於阿耨多羅三藐三菩提不退轉一句是住何等清淨地中次有十句是因何等方便後之二句是何等境界作所應作論牒釋中唯解初二句不釋第三句何等境界中作所應作也清淨地者八地已上三地無相行寂靜清淨故此中以無相理名無上正等覺故後三地皆於無相無功用行住運寂靜離鄣清淨名不退轉非諸有功用有相行等之所退轉故第二因何等方便者有四種一攝取妙法方便住持妙法以樂説力為人説故此攝三句住持妙法者皆得陀羅尼由聞持住持妙法令不捨離住在身心持之不忘故名住持以樂説力者樂説辨才故為人説者轉不退轉法輪為人説此不退輪故二攝取善智識方便以依善知識作所應作故此攝三句以依善知識者供養無量百千諸佛作所應作者於諸佛所殖衆德本德本即善根是所應作故由此常為諸佛之所稱嘆三攝取衆生方便以不捨衆生故此攝一句以慈修身由以大慈悲熏習身心故能不捨一切衆生常能救度四攝取智方便以教化衆生令入彼智故此攝三句善入佛惠通達大智到於彼岸由有三智能令衆生攝取三智故自成三智者令諸衆生攝取三智也因初智知如實自利智也次智是知事利他智也後智是真理智知實性也論中唯解此初二句不釋何等境界中作所應作此攝二句名稱普聞無量世界者是何境界能度無數百千衆生者是所應作由菩薩具三智等故聞遠振十方世界能於此無量世界境界中度百千衆生作所應作度衆生者是諸菩薩之所應作故此初番訖第二復次云復有攝取事門示現諸地攝取功德不同二乘功德故此二句為總標下自別釋二句者一示現諸地二攝取勝功德不同二乘功德故十三句中初四句是示現諸地復九句是攝取勝功德初四句示現諸地者皆於阿耨多羅三藐三菩提不退轉一句是第八地故次二句是第九地次一句是第十地故論下釋示現諸地云地無功用智不同下上故不同下者下功用行不能動故不同上者上無相行不能動故自然而行故案此文意不同下者初二三四五六地有相有功用行所不能動不同上者後第七地中無相有功用行所不能動自然而行唯識釋不動地之相用煩惱不能動故此論解不退轉謂功用不動無相行不動任運進修空有雙證不為二動故名不退問何以得知上無相行者第七地無相行耶答唯識第十云初六地中有無相觀上間雜現行後四地中純無相觀故知上無相行不能動者是第七地無相行第八地行後二地中無相行不能動者不應道理也不同二乘諸功德者所謂二乘者非是聲聞辟支二乘所説二乘者分別十地初三地相同世間故是人天位四五二地是四諦觀世聲聞位第六地中修因緣觀故是辟支位第七地者三乘中是大乘位後三地是一乘位既前七地三乘位故聲聞辟支合為一乘第七地中三乘中菩薩為一乘故合為二乘作如是説妙順附於不同上下文也於九地中得勝進陀羅尼門具足四無礙解自在故九地得間持等滿名為勝進釋皆得陀羅尼具足七四辨等為他説釋樂説辨才於第十地轉不退轉法輪得受佛位如轉輪王子以八九十地同示現諸地論自結之下之九句名攝取功德上之三地皆同得之釋第二攝取勝功德者示現依何處依何心依何智依何等境界行依何等能辨故此有五句論為初標下自別釋依何處攝三句供養無量百千諸佛於諸佛所殖衆德本常為諸佛之所稱歎論云依善知識處所故依何心者攝一句以慈修身論云我依教化衆生心畢竟利益一切衆生諸菩薩以度衆生為心故依何智者攝三句善入佛慧通達大智到於彼岸依三種智一授記密智為衆生説深密義故記者別記別解釋之義即佛慧也二諸通智以大神通利益衆生智即通達大智三真實智證真如故即到於彼岸彼岸即大涅槃故能到者智證之義依何等境界行者名稱普聞無量世界一句也有情世界此諸菩薩所度境界何等能辨者能度無數百千衆生菩薩以三智於彼界中能辨何等事以度衆生依何等境界行依何等能辨者即三種智攝應知者文意謂以三智於世果境中能辨利衆生事用故言三種智攝如來欲説法時至成就者藏師云問方今正説無量義經云何言是欲説法時至成就耶答望後將説法華經故言為欲耳以將説法華故前説無量義即無量義為法華之由序也基云略有三義一依人先為菩薩説一乘經名無量義後為聲聞方説一乘二依利先以一乘利他教理化根熟菩薩後以一乘自利行果方化利根回心聲聞三依法先談法體後談功能故説法華已前先説無量義名為時至和上云如來欲説法時至成就者成道來四十餘年所以未曾説此妙法衆生根未熟説時未至故今根機已熟説法時至是故先説無量義經將為此經之前非也一名無量義經者成就字義故者字即是教義謂為理教無量故義理亦無量無量義經云以諸衆生性欲無量故説法無量説法無量義亦無量無量義者從一法生其一法者即無相也如是無相無相不相名為實相菩薩摩訶薩安住如是實相已所發慈悲明諦不虗於衆生所真能拔苦苦既已復為説法令諸衆生受於快樂善男子菩薩若令如是修一法門無量義者必得疾成無上菩提譬如一種子生百千萬中一一復生百千萬數如是展轉乃至無量此經典亦復如是從於一法生百千義百千義中一一復生百千萬數如是展轉乃至無量無邊之義是故此經名無量義二名最勝修多羅者若對不乘三藏即此經屬菩薩藏名為最勝又下文云文殊師利是法華經是諸如來之説於諸説中最為甚深也三名大方廣經者大方廣是大乘通名即釋此經為諸菩薩説大乘經文大乘文義俱廣故云無量大乘門門即教也隨衆生根住持成熟者釋大乘一無量也以大乘衆生根性無量故大乘教無量四名教菩薩法者至法華時回小入大及直往菩薩根皆已熟故下云如來涅槃時到衆又清淨又教菩薩法者最後燈明佛方説法華故言教菩薩法前二萬佛中唯説三乘不名教菩薩法也五名佛所護念者又下文云文殊師利此法華經是諸如來之説於諸説中最為甚深末後賜與如彼強力之王久護明珠今乃與之此法華經諸佛如來祕密之藏於諸經中最存其上長夜守護不妄宣説始於今日乃與汝等而敷宣之案此文意衆生根未熟説時未至故成道以來四十餘年中未為他説故言以依如來有此經故又應云徑二萬佛未有一乘機故但自受用不為他説故言以依如來有此法故也六名一切諸佛祕密法者如下文云唯佛能知不妄授人名為祕密也七名一切諸佛之藏者如神力品云如來所有一切諸法一切自在神力乃至一切甚深之事皆攝入此經也八名一切諸佛祕密處者如五千增上慢等從座而去不堪聞故九名能生一切諸佛經者如法師品云聞此經一句我皆與授記作佛又方便品云聲聞若菩薩聞我所説法乃至於一偈皆成佛無疑十名一切諸佛之道場者三菩提道於此經故名為場如神力品云當知此處即是道場在處既然經豈不爾十一名一切諸佛轉法輪者如藥王品云能破一切不善暗亦能破五種驚怖七種增上慢三染等十種人病也十二名一切諸佛堅固舍利者平等法身中無三乘差別故言不敗壞於一佛乘分別説三名為敗壞此經唯顯一佛乘無有二乘之義故言不敗壞又多寶品云法身不壞法師品云當知此處有如來全身也十三名大巧方便經者文意正以一佛乘為實得一佛乘竟於一佛乘説二乘及人天乘名為方便如藥草喻品廣説十四名説一乘經者此文意説為顯三乘中佛乘勝故名究竟非二乘若依此文八意趣中究竟者三乘中佛乘最勝故名究竟了非是回二歸一名為究竟莊嚴論云二乘終回小歸大故名為究竟十五名第一義住者第一義即是法身此經能顯法身即是法身住處十六名妙法花蓮經者基師云出水有二義一出水不可盡出離小乘濁泥水故此談花體頓悟菩薩性離泥水法體性常故不可盡此談一乘理性出二乘故名出水二復有義蓮花出泥水喻諸聲聞入如來大衆中坐如諸菩薩坐蓮花上聞説無上智慧清淨境界證如來密藏此意説言菩薩坐花上聞説無上智慧境界能證如來甚深密藏聲聞回心已去得入大衆中坐亦如菩薩坐於蓮花聞説智慧境界亦證密藏前解菩薩頓悟體出此解漸悟後時用出正以教理化諸菩薩傍化二乘故此説花開義者衆生於大乘中起縣岸想心怯弱故不能生信開示如來淨妙法身令生淨信和上云出水者喻對治十慢花開者喻顯十種無上此經所明唯此二義前則破二後則明一故以蓮花喻於妙法門何以得知第十六妙法蓮花明破二明一義耶答夫自經名表宗極矣此經宗者以破二明一以為宗極此論末文言方便品中明五分破二明一之義故知依經宗體立經都號故十七名最上法門者攝成就故攝成就者攝取無量名句字身頻婆羅阿閦婆等偈故此為根本攝餘一切名句義故名為最勝頻婆羅是五十二數中第十八數阿閦婆是第二十數餘大乘經偈頌數此皆能攝故名法門舒盧迦者此反頌也十七名中法門是總餘是別句此經但有三一無量義體用勝故二教菩薩法化根熟故三佛所護念依佛有故三義增勝故偏説之第四依所説法隨順威儀住成就者藏師云隨順威儀住者隨順過去威儀如過去佛説法花時入定動地雨花今亦如是二者隨順衆生現此威儀故下文之為隨順衆生不見對治攝取覺菩提分法故一云隨順威儀者由序之義以入定等為由序方説法花故如説耶若先住對面念以為由序後起方説問今説法花經何故不入法花三昧而入無量義處三昧釋云無量義處三昧有三種力是以依之一者成就自在力身心不動故謂若不入三昧有分別動搖於此不能證説自在今入三昧身心不動離於分別動搖於法便能證説自在故二者離一切障隨自在力故謂入三昧離諸定障隨順於法證説自在若有定障於及説不自在故對治者和上云十種對治謂七喻三平等菩提分法者非三十七中菩提分法以十對治令諸衆生覺大菩提故故言覺菩提法耳為對治無量世來堅執煩惱故者和上云七種增上慢三種染慢堅執者法執之義第五依止説因成就者和上云既住順儀雨花動地將表內證復放豪光衆覩希有之瑞皆起偈作之念依此欲而起説故是故名為依止説因成就問何故依止説因中不説雨花動地耶答放光明自證法甚親近故得為依止雨花動地於自證法遠疏故不為依止問何故此經説時中眉間白豪中放大光明花嚴經説時中面門者放光明其義云何答白豪於舒一丈五尺倦唯三寸為欲現示開分三乘會但一乘之義亦為顯示一乘中道是故眉間白豪放大光明唯照東方者為顯妙法最勝閻浮提四方中東方為本日始出故隨順世間唯照東方花嚴經中從面門放光之意門者出入謂為顯三乘五乘本從一無相流出後還歸於一無相之義是以從面門放十方遍照為顯法界法門普周之義先為大衆示現外事六種振動等者表威儀如法住成就中雨花動地次為示現此法門中內證甚深微密之法者顯示第五依止説因放光之所以內證甚深微密之法者方便品所明證阿舍二種甚深又依器世界下釋光明中所現事於中略明十事依器世界者東方萬八千佛土衆生世間者方萬八千土中所有諸衆生等也數種種者明衆數種種上不同量種種者明器世界形量不同也具足煩惱差別者釋六道衆生不同也六道不同皆由煩惱上中下差別故也具足清淨差別者釋清淨世界差別不同也佛法弟子差別示現三寶者佛即東方萬八千佛土中諸佛等也法即是萬八千土中諸佛所説法弟子謂四衆及菩薩也復乘差別者四衆為小乘菩薩為大乘有世界有佛者東方世界現在佛時名為有佛有世界無佛者佛滅度後以佛舍利起七寶塔名為無佛令衆生見修行者上現十事此明令衆生覩見十事即釋經中於世世界悉見之言也修行者未得果者修三學行而未得四果得道者已得果者已得四果四衆之中有此二類數種種者示現種種觀故者由佛施光示現萬八千土中衆生種種觀不同故名數種種略説四種觀者一者食可禪悅為食亦可是揣等四食二食竟聞法三聞法竟修行竟得果為樂基師云食者謂所見佛資長義任持義是食義佛能資長衆生殊勝善法任持衆生善根不壞故名食又云是示現依止住食又受用義是食義受用法樂能食故名食二聞法如名可知三修行謂四衆修行得道及菩薩行菩薩道四者樂謂所見佛入滅度生滅滅已彼寂為樂量種種者釋下頌中入涅槃已起七寶塔寶塔高妙五千由旬等是行菩薩道者釋經文中種種信解乃至行菩薩道之言也如經所説當自推取者前釋四衆中修行得道者示經文處而今釋菩薩中行菩薩道不示經處但云如經所説當自推取也所示者前文略説之易後文廣引之難故經之種種因緣種種信解種種相貌行菩薩道也種種因緣者為求出生死速證佛果度脫衆生為此因緣修菩薩道或為嚴淨佛土或成就衆生修菩提分行菩薩道或為修四攝六度行菩薩道如是等種種因緣種種信解者有七種所信解一三寶二威力三真實説四種真實四因五果六德説菩提七得方便種種相貌者有五種貌一憐愍二愛語三勇猛四舒手布施五説甚深法第六示現大衆現前欲聞成就者和上云有四種德為聽法器一有證決定二有阿含決定三有現前欲四有不現前欲證決定者證甚深法中深信心之阿含決定亦復如是現前欲者自內心中生未曾有想亦言中現請故言現前欲不現前欲者唯自內心中起未曾有想而言中不現故言不現前欲也具此四德堪聽法器第四威儀如法第五依止説因二門中唯有現前欲此第六門中具有現前不現前二欲名為大衆現前欲聞成就也就文為二前牒章名問一人者已下第二解釋大本經有二門一者疑念二者彌力發問今具釋此二也大本疑念中有二一彌力疑念二大衆疑念今但釋彌力不釋大衆問一人者問意言何故唯問文殊一人不問餘人説多人欲聞生希有心者此即是答以多人欲聞文殊之答是故唯問文殊師利者結問文殊之意也問大衆不知文殊是能答之人云何乃言多欲聞文殊之答耶答彌力能知大衆機緣屬在文殊若聞文殊所説必生希有之心故也如是示現世尊弟子隨順於法不相遠故者釋文殊能答意也然彌力位窮補處遂不能知現瑞之意唯佛能知佛入三昧不可得聞唯文殊是佛但今日示現為世尊弟子萬故餘經云昔為能人師今作弟子化二尊不並在故我為菩薩隨順於法不相違者此有二義一者實是師而示弟子蓋是隨順於法無相違二者文殊能了達法相與法不相違故能答問也佛世尊現神變相者正釋彌力問神變之意為何等義者釋彌力疑念云以何因緣而有此瑞為説大法故者論主釋彌力疑即是答也現大相者眉間光明照于東方萬八千土也為説妙法蓮花經故者為説證甚深也現大瑞相者即是雨花動地也為説如來所得妙法不可思議等文字章句故為説阿含甚深也佛放眉間光為説證甚深也妙法蓮花經者即是證甚深故天雨四花六種振動等為説阿含甚深之瑞也不可思議名字章句者即是阿含甚深也有二種義是故仰推文殊師利者表正文殊五思一者現諸法者文殊是佛了了現見諸法二離諸因緣者以文殊非推度比類而知成論云現見事中因緣無用也唯自內心成就彼法者釋離因緣以文殊自心明見彼事故不假餘因緣也示現種種諸瑞相者以為示現彼彼事者釋大本經之必應見此希有之相事非一故奇彼彼事也如彼事相現沒住滅應當善知者沒者諸佛入滅及起塔等事也現者諸佛現在説法教化等事也住者正法世等事也滅者正法滅盡等事也以文殊能説彼事故者此釋經文已曾親近供養過去無數諸佛之言也所作成就者謂破所修作法此有二種一福德二智慧滿內德滿也因成就者釋因中有二一正因二緣因正因者謂一切智以因一切智能見過去世事故也緣因成就謂衆相者記動地放光雨花名為衆相由見過去世佛現於示相故説大法今見釋迦現示相亦説大法故衆相為説法之因也果相成就者因一切智及瑞相故知欲説大法故大法衆相之果文殊外因既滿內德復圓故能如佛亦説如法果故今推問種種佛土者自上已來釋彌力疑念竟今第二釋彌力發問種種異異佛土者即釋一萬八千佛土也示現彼國土中種種差別應知者此有二意一者示萬八千土種種差別二者示現萬八千土中十事差別淨如國土者即釋經中悉見彼佛國界莊嚴文也如來為上首者自此以下釋論經文單本經無也如來為首者如來既為衆聖之主故稱上首諸菩薩等依如來住者釋上首義餘文易解表經文中又見彼土現在諸佛如是等文單本經中無也論云自此已下次明聖者文殊師利菩薩等自此以下第七文殊師利答成就也於中有二初明現見過去因果故是故能答後明成就十事故是故能答初復有二第一總釋第二別次第釋初總釋中過去因相果相者過去二萬日月燈明佛時之事成就十事者成就者自在之義又圓滿之義見自在故具具足故論云云何現見過去因相以下第二別釋先明因果後釋十事釋因果中曾於彼彼諸佛國土者就二萬億日月燈明非一佛故言彼彼諸佛處處修行種種行事者釋因相也最後燈明佛時中為諸衆生説法花之因緣前二萬燈明佛時修行種種行事故今時為衆得説法花故果相者妙光菩薩爾時為他説二萬佛所修種種行所得之果成就十事四重分別一舉名二釋義三開章四合解第一舉名如文中列釋義者一大義者記恩義大故如來以大恩義欲説大法故二世間文字意甚深因成就者佛説三乘有字無義言近意遠名之為甚深現見希有因成就者和上云徑二萬日月燈明佛不説法花無一乘根故唯最後燈明佛時一乘根熟故方説法花又今釋迦時方説法花故言希有也淨法師云此法説人難值經無量劫或不聞故曰希有四現見勝妙者和上云諸二萬日月燈明佛等唯自內中受用法花不為衆生説法花故言勝妙也五現見受用大者八王子等在家之時受用五塵勝妙境界出家之時八十小劫中身心不動受用法花也六現見攝取諸佛法輪者燈明佛滅度之後妙光菩薩持法花經八十小劫為人演説七現見善堅實如來轉法輪因成就者八王子等受妙光教堅固菩提永不退故八現見能進入因成就者八王子等進成佛道故也九現見憶念因成就者彌力菩薩令憶念昔求名故也十現見自身所徑事因成就者文殊師利現見昔自所徑妙光身及彌力昔求名之身故也此十通名因成就者因者所以之義成就者自在之義淨師云因成就者由文殊見昔十事為答彌力之因見之自在故言成就也第三開章論文明了更不復釋八種大義者一斷疑二增長純熟智身三入聲聞密境界四入菩薩密境界五進取上上淨六進取一切智七建立名字章句義八令證智轉法輪此八大義如次配屬於欲論等八句第一欲論大法云何願斷疑大義也大法者是大乘法大乘法有三義一性二隨三得性者即真如也隨者即智福也得者即四德果也第一是自性住佛性第二是引出佛性第三是至得果佛性此三佛性令求道者生決定信一信實有即自性住佛性二信可得即引出佛性三信有無窮功德即至得果佛性由此三信能破闡提不信障入十信位故曰斷疑大義藏師云欲論大法者大法者即一乘大法今説一乘故即斷舊新二疑之心舊疑者自四十餘年每作是念我等同入法性云何如來以小乘而見濟度等新生疑者我今自於智疑或不能了為是究竟法為是行道等也為斷此疑今説一乘是故欲論大法第二欲雨大法雨云何願增長智身大義法從佛流雨能潤智身為雨前既得信必有智隨若法水不雨則智身不生故次雨大法雨增長智身此時即破外道我見障入十解位故曰增長智身大義藏師云雨大法雨者如世間雨能令物增長此一乘法雨潤三乘人令入平等大慧也身子云疑悔永已盡安住實智中故也第三擊大法鼓云何願入聲聞密境界大義擊者動也法鼓者法音也破虗空定諸聲聞等所不能聞謂之密如來動法音以令聞謂之入由此定力所出如意譬如破空出物故以為名案聲聞此時聞佛道聲方欣此定即破畏苦障入十解位曰入聲聞密境界大義藏師云根淳熟者為從二種微密境界第三欲擊大法鼓及第七欲大法鼓也前既明三乘智身淳熟今欲授三乘人作佛記説密境界智度論云法花經令二乘作佛名祕密法者甚深難解故也又四十餘年曾不明此事故稱為密大法鼓者二句示現以遠聞者正釋法鼓之名夫鼓令人遠聞今説大法普授三乘人説令十方遠聞二句示現者一是擊大法鼓二是不斷大法鼓問何故云不斷法答夫二乘獨善必不傳化若得授記成佛必更傳化餘人亦令成佛故云不斷法鼓也淨法師云不斷大法鼓云何顯入菩薩密境界大義此記令緣覺入菩薩密境界菩薩以悲為體無方救苦為密如來法音不絶彼則進入悲境此時破獨覺自愛障入十回位故曰入菩薩密境界大義基師云欲擊大法鼓者聞往聲聞乘為權密境界今顯所説菩薩乘為實密境界令捨昔權欲歸今實是以擊二之鼓也五欲建大法幢云何顯進取上上淨大義幢以勝出為相初四地中得大乘光三摩提能破暗故名光此四地中真如顯出譬之如幢此時破闡提無明習氣即方便生死入大淨位故言進取上上淨大義藏師云入密境界者令進取上上清淨義故者釋欲建大法幢三乘既得授記然後行菩薩行菩薩遠離二邊是中道行故攝上上清淨法幢既高故攝上上六欲燃大法燈云何顯進取一切種智大義燃燈以了物為相次三地中得集福德王三摩提一切善法除般若悉名福德能生能長能圓故名集於生長圓處自在故名王五地中依此定起五明智了於俗六地中依此定般若現前能了於真七地中依此定觀染淨不二泯於真俗三照圓滿故譬之如燈此時破外道我見習氣即因緣生死入大我位故言進取一切智大義藏師云欲燃大法燈者夫燈有二義一者破暗二者顯物三乘人行既滿破無明暗得一切種智故能見佛性等法前之四句令三乘人因行成今此一句令三乘人果德滿七欲吹大法蠡云何顯建立名字章句大義吹蠡以改號為相八地九地得賢護三摩提賢有二義一能現前安樂住二能引攝諸功德八地中依此定行於一道為成就佛法九地中依此定行於一道為成就衆生既行一實之道遂改三乘之號故譬以吹蠡此時破聲聞畏苦習氣即有有生死入大樂位故曰建立一乘名字章句義大義藏師云吹大法蠡者出語言音聲三乘人得佛果竟更為衆生説一切教故云為一切法建立名字章句也八欲説大法云何顯證智轉法輪大義轉輪以破障為相第十地及佛地得首慢伽摩三昧首楞名健伽摩名行菩薩及佛有四勝德故名健一無畏得一切智故二無疑見自身無與等故三堅實恆在觀無散故四勝能能破難破無明地故具四德人於此定能得行故稱伽摩得此定者自行圓滿多行利他能破獨覺自愛習氣即無有生死入大常位若不證者即不能説曰令入不可説證智轉法輪大義依此八句令彼八障得入八位成八大恩為八大義現見世間名字章句章甚深因成就者釋十章中第二章門經文處者釋欲令衆生咸得聞知一切世間難信之法經文也問何故云名字章句意甚深耶答三乘之教隨世間心不願真實故名世間名字章句者説三乘教名字章句也意甚深者佛説三乘教之意趣言近意遠謂初説三乘終至一乘故言意甚深也三現見希有因成就者希有四種一時遇難二説人遇難三聞法遇難四請機遇難以此四種名為希有不可議者過情計之境不可攝者過言議境不可量者非喻笇境今經云無量者過笇分喻分無邊者過時分不思議者過情計分即同般若過四分也劫有二種一劫不可説二時不可説劫不可説者一劫為一至於無數名劫阿僧祇時不可説者此論所説五種之劫一夜為一數至於無數乃至年為一數至於無數名五種劫四現見勝妙因成就者和上云勝妙者二萬諸佛唯自內中受用法花不為他説名為勝妙藏師云二萬億佛所説三乘之法皆具七善名為勝妙五現見受用大因成就者八王子等在家之時受用五塵勝妙之樂出家之時六十小劫中身心不動受用法樂所受大故名為大也六現見攝取一切諸佛轉法輪成就者上來五章明佛行化事竟次四章門明能益物後一明所化義利今此章中明妙光菩薩佛滅度後和經之時即是轉法輪不斷而言一切佛者現見一切佛轉之於前菩薩於佛滅後敷之不絶即令一切佛法輪不斷故言一切也七現見善堅實如來法輪因成就者妙光菩薩從八十劫已後八王子等令堅固無上菩提以無上菩提無量時中説法輪不壞名為善堅實如來法輪八現見能進入因成就者第六第七明妙光能化事今此第八明八王子等皆得經益由此經益後唯成佛名為進入九現見憶念因成就者明憶念過去中妙光菩薩為他説法利益他故十現見自身所徑事因成就者明文殊令憶念過去中妙光能解法花復能為人演説即定自身受勝妙樂汝號求名者別釋彌力事於中二句初釋汝號求名後示現得彼法示彌力之終以彌力亦得此法具足成佛也一與説者十種事中第一現見大義因成就結也三令待説者最後二行偈結此二行偈待方便品所説故也偈四十五中以十事配頌初二事略不頌也以後八事配屬於頌初初一行偈頌第三希有次一行偈頌勝妙因次以二十九行偈頌受用大次以一行偈頌攝取一切諸佛轉法輪次一行偈頌善堅實次一行偈頌能進入次六行偈頌憶念因次三行偈頌自身所徑事也方便品依論十七種名中第十三名一切諸佛大巧方便經依此法門成大菩提已為衆生説人天聲聞辟支佛等法名大巧方便故言方便品又下論明佛有七種方便故云方便品依下論未論主開方便為五彼一説妙法功德次説如來法師功德第三明大衆三義分第四明如來四義分第五釋四種疑分和上云第二五分破二明一開方便門此品初中雖門實相從多分而説開方便從多分者開方便文多示真實相文略開方便文多者謂八種阿含及四釋法師功德等也示真實相文略者唯取諸佛智慧甚深無量之文故也破二明一者三説不同一云破二者謂破二乘執明一者即是菩薩乘第二説破二者謂大小之二類二乘合為一類菩薩乘為一類破此二執故言破二也明一者謂十種無上第三説二乘合為一類二菩薩合為一類謂三乘中菩薩乘及以雲雨所對治菩薩合為一類破此二故言破二明一者謂十種無上歎法分標取明之一歎師分示能説之人疑請分即顯取破之三乘授記分現能破之一道斷疑分更總定時處通明授受方便謂二種方便一捨方便二開方便捨方便者隨彼曲見應捨方便開方便者能顯實相應開方便隨彼曲見應捨方便者謂此經下文云正直捨方便又無垢稱經云方便有二種一無慧方便縛二有慧方便解無慧
